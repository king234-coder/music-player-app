<!DOCTYPE html>
<html>
<head>
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

  <h2>🎧Music Player</h2>

 <b><p id="nowPlaying">Now Playing: None</p></b> 

  <audio id="audio" controls></audio>

  <div class="controls">
    <button onclick="playPause()">Play / Pause</button>
  </div>

  <div class="volume-box">
    🔊Volume
    <input type="range" id="volume" min="0" max="1" step="0.1">
  </div>

  <ul id="playlist">
  <li onclick="playSong(this)" data-src="Naat 1.mp3">Loading...</li>
  <li onclick="playSong(this)" data-src="Naat 2.mp3">Loading...</li>
</ul>

</div>

<script src="script.js"></script>
</body>
</html>
