<!DOCTYPE html>
<html>
<head>
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Main Music Player Container -->
<div class="player">

  <!-- Player Heading -->
  <h2>🎵 Music Player</h2>

  <!-- Current Playing Song Name -->
  <p id="nowPlaying">Now Playing: None</p>

  <!-- Audio Player -->
  <audio id="audio" controls></audio>

  <!-- Music Controls -->
  <div class="controls">

    <button onclick="previousSong()">⏮</button>
    <button onclick="playPause()">▶</button>
    <button onclick="nextSong()">⏭</button>

  </div>

  <!-- Volume Controls -->
  <div class="volume-box">

    🔊 Volume:
    <span id="volumeValue">50%</span>
    <br>
    <input type="range" id="volume" min="0" max="1" step="0.1">

  </div>

  <!-- Song Playlist -->
  <ul id="playlist">

    <li onclick="playSong('Naat 1.mp3', this)">
      Naat 1.mp3
    </li>

    <li onclick="playSong('Naat 2.mp3', this)">
      Naat 2.mp3
    </li>

    <li onclick="playSong('songs/song3.mp3', this)">
      Song 3.mp3
    </li>

    <li onclick="playSong('songs/song4.mp3', this)">
      Song 5.mp3
    </li>

    <li onclick="playSong('songs/song5.mp3', this)">
      Song 5.mp3
    </li>

    <li onclick="playSong('songs/song6.mp3', this)">
      Song 6.mp3
    </li>

  </ul>

</div>

<script src="script.js"></script>

</body>
</html>
